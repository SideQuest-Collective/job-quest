  const [planLoadingKeys, setPlanLoadingKeys] = useState({});
  const saveTimer = useRef(null);

  // Build role list: all roles from all intel, merged with tracker data
  const allTips = allIntel.flatMap(r => r.tips || []);
  const roleMap = {};
  allRoles.forEach(r => {
    const key = `${r.company}|${r.role}`;
    if (!roleMap[key]) roleMap[key] = { ...r, key };
  });

  // Determine stage for each role
  const getRoleStage = (key) => {
    if (roleTracker[key]) return roleTracker[key].stage;
    if (roleActions.applied?.includes(key)) return 'applied';
    if (roleActions.saved?.includes(key)) return 'discovered';
    return 'discovered';
  };

  const roles = Object.values(roleMap).map(r => ({
    ...r,
    stage: getRoleStage(r.key),
    tracked: !!roleTracker[r.key],
    lastActivity: roleTracker[r.key]?.timeline?.slice(-1)[0]?.date || r.intelDate || '',
  }));

  // Filter
  const savedSet = new Set(roleActions.saved || []);
  const filtered = roles.filter(r => {
    if (filter === 'all') return r.stage !== 'rejected';
    if (filter === 'saved') return savedSet.has(r.key);
    if (filter === 'active') return ['discovered','researching'].includes(r.stage);
    if (filter === 'applied') return r.stage === 'applied';
    if (filter === 'interviewing') return ['phone-screen','onsite'].includes(r.stage);
    if (filter === 'archived') return ['offer','rejected'].includes(r.stage);
    return true;
  }).sort((a, b) => (b.lastActivity || '').localeCompare(a.lastActivity || ''));

  // Auto-select first role
  useEffect(() => {
    if (!selectedKey && filtered.length > 0) setSelectedKey(filtered[0].key);
  }, [filtered.length]);

  const selected = selectedKey ? roleMap[selectedKey] : null;
  const tracker = selectedKey ? (roleTracker[selectedKey] || null) : null;
  const stage = selectedKey ? getRoleStage(selectedKey) : 'discovered';
  const companyTips = selected ? allTips.filter(t => t.company && selected.company.toLowerCase().includes(t.company.toLowerCase())) : [];

  // Save tracker with debounce
  const saveTracker = (updated) => {
    setRoleTracker(updated);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { api.post('/api/role-tracker', updated); }, 500);
  };

  // Ensure tracker entry exists
  const ensureTracker = () => {
    if (!selectedKey) return roleTracker;
    if (roleTracker[selectedKey]) return roleTracker;
    const now = new Date().toISOString();
    const entry = {
      stage: getRoleStage(selectedKey),
      notes: '',
      checklist: DEFAULT_CHECKLISTS[getRoleStage(selectedKey)]?.map(t => ({ text: t, done: false })) || [],
      timeline: [{ date: now, event: 'Added to tracker' }],
    };
    const updated = { ...roleTracker, [selectedKey]: entry };
    saveTracker(updated);
    return updated;
  };

  const setStage = (newStage) => {
    const t = ensureTracker();
    const now = new Date().toISOString();
    const entry = { ...t[selectedKey], stage: newStage };
    entry.timeline = [...(entry.timeline || []), { date: now, event: `Stage changed to ${STAGE_LABELS[newStage]}` }];
    // Add default checklist items for new stage if checklist is empty or all done
    const defaults = DEFAULT_CHECKLISTS[newStage] || [];
    if (defaults.length > 0) {
      const existing = new Set((entry.checklist || []).map(c => c.text));
      defaults.forEach(d => { if (!existing.has(d)) entry.checklist = [...(entry.checklist || []), { text: d, done: false }]; });
    }
    saveTracker({ ...t, [selectedKey]: entry });
  };

  const toggleCheckItem = (idx) => {
    const t = ensureTracker();
    const entry = { ...t[selectedKey] };
    entry.checklist = [...entry.checklist];
    entry.checklist[idx] = { ...entry.checklist[idx], done: !entry.checklist[idx].done };
    saveTracker({ ...t, [selectedKey]: entry });
  };

  const addCheckItem = () => {
    if (!newCheckItem.trim()) return;
    const t = ensureTracker();
    const entry = { ...t[selectedKey] };
    entry.checklist = [...(entry.checklist || []), { text: newCheckItem.trim(), done: false }];
    saveTracker({ ...t, [selectedKey]: entry });
    setNewCheckItem('');
  };

  const removeCheckItem = (idx) => {
    const t = ensureTracker();
    const entry = { ...t[selectedKey] };
    entry.checklist = entry.checklist.filter((_, i) => i !== idx);
    saveTracker({ ...t, [selectedKey]: entry });
  };

  const updateNotes = (val) => {
    const t = ensureTracker();
    saveTracker({ ...t, [selectedKey]: { ...t[selectedKey], notes: val } });
  };

  const addTimelineEvent = () => {
    if (!newTimelineEvent.trim()) return;
    const t = ensureTracker();
    const entry = { ...t[selectedKey] };
    entry.timeline = [...(entry.timeline || []), { date: new Date().toISOString(), event: newTimelineEvent.trim() }];
    saveTracker({ ...t, [selectedKey]: entry });
    setNewTimelineEvent('');
  };

  const [prepTab, setPrepTab] = useState('questions');
  const [revealedAnswers, setRevealedAnswers] = useState({});
  const [quizAnswers, setQuizAnswers] = useState({});
  const [quizSubmitted, setQuizSubmitted] = useState(false);
  const [readinessChecks, setReadinessChecks] = useState({});
  const [practiceAnswers, setPracticeAnswers] = useState({});
  const [evaluations, setEvaluations] = useState({});
  const [evaluatingKeys, setEvaluatingKeys] = useState({});

  // Load persisted prep state when switching roles
  useEffect(() => {
    setRevealedAnswers(tracker?.revealedAnswers || {});
    setQuizAnswers(tracker?.quizAnswers || {});
    setQuizSubmitted(!!tracker?.quizSubmitted);
    setPrepTab('questions');
    setReadinessChecks(tracker?.readinessChecks || {});
    setPracticeAnswers(tracker?.practiceAnswers || {});
    setEvaluations(tracker?.evaluations || {});
  }, [selectedKey]);

  const planLoading = !!planLoadingKeys[selectedKey];

  const submitForReview = async (qKey, question, userAnswer, sampleAnswer, category) => {
    if (!userAnswer.trim() || evaluatingKeys[qKey]) return;
    setEvaluatingKeys(prev => ({ ...prev, [qKey]: true }));
    try {
      const result = await api.post('/api/evaluate-answer', { question, userAnswer, sampleAnswer, category });
      const updated = { ...evaluations, [qKey]: result };
      setEvaluations(updated);
      savePrepState({ evaluations: updated, practiceAnswers: { ...practiceAnswers } });
    } catch (e) { console.error('Evaluation failed:', e); }
    setEvaluatingKeys(prev => { const n = { ...prev }; delete n[qKey]; return n; });
  };

  const updatePracticeAnswer = (qKey, value) => {
    const updated = { ...practiceAnswers, [qKey]: value };
    setPracticeAnswers(updated);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { savePrepState({ practiceAnswers: updated }); }, 1000);
  };

  const generatePlan = async () => {
    if (!selected || planLoadingKeys[selectedKey]) return;
    const key = selectedKey;
    setPlanLoadingKeys(prev => ({ ...prev, [key]: true }));
    setRevealedAnswers({});
    setQuizAnswers({});
    setQuizSubmitted(false);
    setPracticeAnswers({});
    setEvaluations({});
    const resumeFile = await api.get('/api/resume');
    try {
      const res = await api.post('/api/interview-plan', {
        roleKey: key,
        company: selected.company,
        role: selected.role,
        level: selected.level,
        location: selected.location,
        fit: selected.fit,
        tips: companyTips,
        resumeSummary: resumeFile?.summary || '',
        resumeSkills: resumeFile?.skills || [],
      });
      if (res.plan || res.fallbackMarkdown) {
        const t = ensureTracker();
        const entry = { ...t[key], interviewPlan: res.plan || null, interviewPlanRaw: null, revealedAnswers: {}, quizAnswers: {}, quizSubmitted: false, readinessChecks: {}, practiceAnswers: {}, evaluations: {} };
        if (res.fallbackMarkdown) entry.interviewPlanRaw = res.fallbackMarkdown;
        entry.timeline = [...(entry.timeline || []), { date: new Date().toISOString(), event: 'Interview prep plan generated' }];
        saveTracker({ ...t, [key]: entry });
      }
    } catch {
      // silent fail
    }
    setPlanLoadingKeys(prev => { const next = { ...prev }; delete next[key]; return next; });
  };

  const quizScore = tracker?.interviewPlan?.quiz ? (() => {
    if (!quizSubmitted) return null;
    const quiz = tracker.interviewPlan.quiz;
    const correct = quiz.filter((q, i) => quizAnswers[i] === q.correctIndex).length;
    return { correct, total: quiz.length, pct: Math.round((correct / quiz.length) * 100) };
  })() : null;

  const savePrepState = (updates) => {
    const t = ensureTracker();
    const entry = { ...t[selectedKey], ...updates };
    saveTracker({ ...t, [selectedKey]: entry });
  };

  const saveReadinessCheck = (idx, checked) => {
    const updated = { ...readinessChecks, [idx]: checked };
    setReadinessChecks(updated);
    savePrepState({ readinessChecks: updated });
  };

  const readinessScore = tracker?.interviewPlan?.readinessChecklist ? (() => {
    const total = tracker.interviewPlan.readinessChecklist.length;
    const done = Object.values(readinessChecks).filter(Boolean).length;
    return { done, total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  })() : null;

  const isReady = quizScore && quizScore.pct >= 70 && readinessScore && readinessScore.pct >= 80;

  const timeAgo = (dateStr) => {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'today';
    if (diff === 1) return '1d ago';
    return `${diff}d ago`;
  };

  return (
    <>
      <div className="codelab-toolbar anim-enter">
        <h2>Intel</h2>
        <div style={{flex:1}} />
        <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{roles.length} roles tracked</span>
      </div>

      <div className="intel-split anim-enter anim-delay-1" style={{border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden'}}>
        {/* Left Panel */}
        <div className="intel-left">
          <div className="intel-left-header">
            <div className="intel-filter-tabs">
              {[['all','All'],['saved','Saved'],['active','Active'],['applied','Applied'],['interviewing','Interview'],['archived','Archive']].map(([id,label]) => (
                <div key={id} className={`intel-filter-tab ${filter===id?'active':''}`} onClick={() => setFilter(id)}>{label}</div>
              ))}
            </div>
          </div>
          <div className="intel-role-list">
            {filtered.map(r => (
              <div key={r.key} className={`intel-role-item ${selectedKey===r.key?'active':''}`} onClick={() => setSelectedKey(r.key)}>
                <div className="iri-company">
                  <span className={`stage-dot stage-${r.stage}`} />
                  {r.company}
                  {!r.tracked && !roleActions.saved?.includes(r.key) && !roleActions.applied?.includes(r.key) && <span className="iri-new">new</span>}
                </div>
                <div className="iri-title">{r.role}</div>
                <div className="iri-meta">
                  <span>{r.level}</span>
                  <span>&middot;</span>
                  <span>{STAGE_LABELS[r.stage]}</span>
                  {r.lastActivity && <><span>&middot;</span><span>{timeAgo(r.lastActivity)}</span></>}
                </div>
              </div>
            ))}
            {filtered.length === 0 && <div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:13}}>No roles in this filter.</div>}
          </div>
        </div>

        {/* Right Panel */}
        <div className="intel-right">
          {selected ? (
            <>
              {/* Header */}
              <div style={{marginBottom:8}}>
                <div style={{fontSize:12,fontFamily:'var(--font-mono)',color:STAGE_COLORS[stage],fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,marginBottom:4}}>{selected.company}</div>
                <h3 style={{fontSize:22,fontWeight:700,marginBottom:4}}>{selected.role}</h3>
                <div style={{fontSize:13,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{selected.level} &middot; {selected.location}</div>
              </div>

              {/* Stage Stepper */}
              <div className="stage-stepper" style={{marginBottom:20}}>
                {STAGES.filter(s => s !== 'rejected').map((s, i, arr) => {
                  const stageIdx = STAGES.indexOf(stage);
                  const thisIdx = STAGES.indexOf(s);
                  const isCurrent = s === stage;
                  const isCompleted = stage !== 'rejected' && thisIdx < stageIdx;
                  return (
                    <div key={s} className="stage-step">
                      <div className="stage-step-wrap">
                        <div className={`stage-step-dot ${isCurrent ? 'current' : ''} ${isCompleted ? 'completed' : ''}`}
                          style={isCurrent ? {borderColor: STAGE_COLORS[s], background: `${STAGE_COLORS[s]}22`, color: STAGE_COLORS[s]} : {}}
                          onClick={() => setStage(s)}>
                          {isCompleted ? <Icons.check style={{width:12,height:12}} /> : (i + 1)}
                        </div>
                        <span className="stage-step-label">{STAGE_LABELS[s]}</span>
                      </div>
                      {i < arr.length - 1 && <div className={`stage-step-line ${isCompleted ? 'completed' : ''}`} />}
                    </div>
                  );
                })}
                <div style={{marginLeft:8}}>
                  <div className="stage-step-wrap">
                    <div className={`stage-step-dot ${stage === 'rejected' ? 'rejected' : ''}`} onClick={() => setStage(stage === 'rejected' ? 'discovered' : 'rejected')} style={{width:24,height:24,fontSize:9}}>
                      <Icons.x style={{width:10,height:10}} />
                    </div>
                    <span className="stage-step-label">Reject</span>
                  </div>
                </div>
              </div>

              {/* Fit Analysis */}
              {selected.fit && (
                <div className="mc-section">
                  <div className="mc-section-title"><Icons.zap style={{width:14,height:14,color:'var(--emerald)'}} /> Why This Fits You</div>
                  <div className="mc-fit">{selected.fit}</div>
                </div>
              )}

              {/* Prep Checklist */}
              <div className="mc-section">
                <div className="mc-section-title"><Icons.checkSquare style={{width:14,height:14,color:'var(--amber)'}} /> Prep Checklist</div>
                {(tracker?.checklist || DEFAULT_CHECKLISTS[stage] || []).map((item, i) => {
                  const c = typeof item === 'string' ? { text: item, done: false } : item;
                  return (
                    <div key={i} className={`mc-checklist-item ${c.done ? 'done' : ''}`}>
                      <div className={`checkbox ${c.done ? 'checked' : ''}`} onClick={() => { ensureTracker(); toggleCheckItem(i); }} style={{cursor:'pointer'}} />
                      <span style={{flex:1}}>{c.text}</span>
                      {tracker && <button onClick={() => removeCheckItem(i)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',opacity:0.5,fontSize:14}}>&times;</button>}
                    </div>
                  );
                })}
                <div className="mc-add-item">
                  <input value={newCheckItem} onChange={e => setNewCheckItem(e.target.value)} placeholder="Add prep item..." onKeyDown={e => e.key === 'Enter' && addCheckItem()} />
                  <button className="btn btn-primary" style={{padding:'6px 14px',fontSize:12}} onClick={addCheckItem}>Add</button>
                </div>
              </div>

              {/* Interview Tips */}
              {companyTips.length > 0 && (
                <div className="mc-section">
                  <div className="mc-section-title"><Icons.messageCircle style={{width:14,height:14,color:'var(--cyan)'}} /> Interview Tips ({companyTips.length})</div>
                  {companyTips.map((t, i) => (
                    <div key={i} className="intel-tip" style={{marginBottom:8}}>{t.text}<div className="source">Source: {t.source}</div></div>
                  ))}
                </div>
              )}

              {/* Interview Prep Plan */}
              <div className="mc-section">
                <div className="mc-section-title" style={{display:'flex',alignItems:'center'}}>
                  <Icons.clipboard style={{width:14,height:14,color:'var(--amber)'}} /> <span style={{marginLeft:6}}>Interview Prep</span>
                  {(tracker?.interviewPlan || tracker?.interviewPlanRaw || (tracker?.timeline || []).some(e => e.event && e.event.includes('prep plan'))) && (
                    <button onClick={() => setPage('prepplans')} style={{marginLeft:'auto',background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',color:'var(--amber)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-mono)',fontWeight:600,display:'flex',alignItems:'center',gap:4,transition:'all 0.15s'}}>
                      <Icons.externalLink style={{width:10,height:10}} /> View in Prep Plans
                    </button>
                  )}
                </div>
                {tracker?.interviewPlan && typeof tracker.interviewPlan === 'object' ? (
                  <>
                    <div className="prep-tabs">
                      <div className={`prep-tab ${prepTab==='questions'?'active':''}`} onClick={() => setPrepTab('questions')}>Practice</div>
                      <div className={`prep-tab ${prepTab==='quiz'?'active':''}`} onClick={() => setPrepTab('quiz')}>Quiz{quizScore ? ` ${quizScore.pct}%` : ''}</div>
                      <div className={`prep-tab ${prepTab==='readiness'?'active':''}`} onClick={() => setPrepTab('readiness')}>Ready?{readinessScore ? ` ${readinessScore.pct}%` : ''}</div>
                    </div>

                    {prepTab === 'questions' && (
                      <>
                        {/* Technical Questions */}
                        {(tracker.interviewPlan.technicalQuestions || []).map((q, i) => (
                          <div key={'tq'+i} className="prep-card">
                            <div className="prep-card-header">
                              <span className={`prep-card-cat ${q.category}`}>{q.category}</span>
                              <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{q.difficulty}</span>
                            </div>
                            <div className="prep-q">{q.question}</div>
                            {(() => { const qKey = 'tq'+i; const ev = evaluations[qKey]; const isEvaluating = !!evaluatingKeys[qKey]; return (<>
                              {q.type === 'code' ? (
                                <button className="btn btn-primary" style={{marginBottom:8}} onClick={() => setPage('codelab')}>
                                  <Icons.code style={{width:14,height:14}} /> Open in Code Lab
                                </button>
                              ) : (
                                <textarea className="prep-textarea" placeholder="Write your answer here..." value={practiceAnswers[qKey] || ''} onChange={e => updatePracticeAnswer(qKey, e.target.value)} />
                              )}
                              <div className="prep-actions">
                                <button className="btn btn-primary" disabled={!(practiceAnswers[qKey] || '').trim() || isEvaluating} onClick={() => submitForReview(qKey, q.question, practiceAnswers[qKey], q.sampleAnswer, q.category)}>
                                  {isEvaluating ? 'Evaluating...' : <><Icons.zap style={{width:12,height:12}} /> Submit for Review</>}
                                </button>
                                <button className="prep-reveal-btn" onClick={() => { const updated = {...revealedAnswers, [qKey]: true}; setRevealedAnswers(updated); savePrepState({ revealedAnswers: updated }); }}>Show Reference Answer</button>
                              </div>
                              {ev && (
                                <div className="prep-eval">
                                  <span className="prep-eval-score" style={{background: ev.score >= 7 ? 'var(--emerald-dim)' : ev.score >= 4 ? 'var(--amber-dim)' : 'var(--rose-dim)', color: ev.score >= 7 ? 'var(--emerald)' : ev.score >= 4 ? 'var(--amber)' : 'var(--rose)'}}>{ev.score}/{ev.maxScore}</span>
                                  <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:8}}>{ev.feedback}</div>
                                  {ev.strengths?.length > 0 && <div style={{marginTop:6}}><span style={{fontSize:10,fontWeight:700,color:'var(--emerald)',fontFamily:'var(--font-mono)'}}>STRENGTHS</span><ul className="prep-eval-list">{ev.strengths.map((s,j)=><li key={j}>{s}</li>)}</ul></div>}
                                  {ev.improvements?.length > 0 && <div style={{marginTop:6}}><span style={{fontSize:10,fontWeight:700,color:'var(--amber)',fontFamily:'var(--font-mono)'}}>IMPROVEMENTS</span><ul className="prep-eval-list">{ev.improvements.map((s,j)=><li key={j}>{s}</li>)}</ul></div>}
                                </div>
                              )}
                              {revealedAnswers[qKey] && (
                                <div className="prep-answer">
                                  {q.sampleAnswer}
                                  {q.followUps?.length > 0 && (
                                    <div style={{marginTop:10}}>
                                      <div style={{fontSize:11,fontWeight:700,color:'var(--cyan)',fontFamily:'var(--font-mono)',marginBottom:4}}>FOLLOW-UPS</div>
                                      {q.followUps.map((f, j) => <div key={j} className="prep-followup">{f}</div>)}
                                    </div>
                                  )}
                                </div>
                              )}
                            </>); })()}
                          </div>
                        ))}
                        {/* Behavioral Questions */}
                        {(tracker.interviewPlan.behavioralQuestions || []).map((q, i) => (
                          <div key={'bq'+i} className="prep-card">
                            <div className="prep-card-header">
                              <span className="prep-card-cat behavioral">behavioral</span>
                            </div>
                            <div className="prep-q">{q.question}</div>
                            {q.whatTheyLookFor && <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8,fontStyle:'italic'}}>What they look for: {q.whatTheyLookFor}</div>}
                            {(() => { const qKey = 'bq'+i; const ev = evaluations[qKey]; const isEvaluating = !!evaluatingKeys[qKey]; return (<>
                              <textarea className="prep-textarea" placeholder="Write your STAR response here (Situation, Task, Action, Result)..." value={practiceAnswers[qKey] || ''} onChange={e => updatePracticeAnswer(qKey, e.target.value)} />
                              <div className="prep-actions">
                                <button className="btn btn-primary" disabled={!(practiceAnswers[qKey] || '').trim() || isEvaluating} onClick={() => submitForReview(qKey, q.question, practiceAnswers[qKey], JSON.stringify(q.starFramework), 'behavioral')}>
                                  {isEvaluating ? 'Evaluating...' : <><Icons.zap style={{width:12,height:12}} /> Submit for Review</>}
                                </button>
                                <button className="prep-reveal-btn" onClick={() => { const updated = {...revealedAnswers, [qKey]: true}; setRevealedAnswers(updated); savePrepState({ revealedAnswers: updated }); }}>Show STAR Framework</button>
                              </div>
                              {ev && (
                                <div className="prep-eval">
                                  <span className="prep-eval-score" style={{background: ev.score >= 7 ? 'var(--emerald-dim)' : ev.score >= 4 ? 'var(--amber-dim)' : 'var(--rose-dim)', color: ev.score >= 7 ? 'var(--emerald)' : ev.score >= 4 ? 'var(--amber)' : 'var(--rose)'}}>{ev.score}/{ev.maxScore}</span>
                                  <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:8}}>{ev.feedback}</div>
                                  {ev.strengths?.length > 0 && <div style={{marginTop:6}}><span style={{fontSize:10,fontWeight:700,color:'var(--emerald)',fontFamily:'var(--font-mono)'}}>STRENGTHS</span><ul className="prep-eval-list">{ev.strengths.map((s,j)=><li key={j}>{s}</li>)}</ul></div>}
                                  {ev.improvements?.length > 0 && <div style={{marginTop:6}}><span style={{fontSize:10,fontWeight:700,color:'var(--amber)',fontFamily:'var(--font-mono)'}}>IMPROVEMENTS</span><ul className="prep-eval-list">{ev.improvements.map((s,j)=><li key={j}>{s}</li>)}</ul></div>}
                                </div>
                              )}
                              {revealedAnswers[qKey] && (
                                <div className="prep-answer">
                                  <dl className="prep-star">
                                    <dt>S</dt><dd>{q.starFramework?.situation}</dd>
                                    <dt>T</dt><dd>{q.starFramework?.task}</dd>
                                    <dt>A</dt><dd>{q.starFramework?.action}</dd>
                                    <dt>R</dt><dd>{q.starFramework?.result}</dd>
                                  </dl>
                                </div>
                              )}
                            </>); })()}
                          </div>
                        ))}
                        {/* System Design Prompt */}
                        {tracker.interviewPlan.systemDesignPrompt && (
                          <div className="prep-card" style={{borderLeft:'3px solid var(--cyan)'}}>
                            <span className="prep-card-cat system-design" style={{marginBottom:8,display:'inline-block'}}>System Design Challenge</span>
                            <div className="prep-q">{tracker.interviewPlan.systemDesignPrompt.title}</div>
                            <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.6,marginBottom:10}}>{tracker.interviewPlan.systemDesignPrompt.description}</div>
                            <div className="prep-actions" style={{marginBottom:10}}>
                              <button className="btn btn-primary" onClick={() => setPage('sysdesign')}>
                                <Icons.messageCircle style={{width:14,height:14}} /> Practice in Mock Interview
                              </button>
                              <button className="prep-reveal-btn" onClick={() => { const updated = {...revealedAnswers, sd: true}; setRevealedAnswers(updated); savePrepState({ revealedAnswers: updated }); }}>Show Key Topics</button>
                            </div>
                            {(() => { const ev = evaluations['sd']; const isEvaluating = !!evaluatingKeys['sd']; return (<>
                              <textarea className="prep-textarea" placeholder="Or write your system design answer here..." value={practiceAnswers['sd'] || ''} onChange={e => updatePracticeAnswer('sd', e.target.value)} />
                              <div className="prep-actions">
                                <button className="btn btn-secondary" disabled={!(practiceAnswers['sd'] || '').trim() || isEvaluating} onClick={() => submitForReview('sd', tracker.interviewPlan.systemDesignPrompt.title + ': ' + tracker.interviewPlan.systemDesignPrompt.description, practiceAnswers['sd'], (tracker.interviewPlan.systemDesignPrompt.keyTopics || []).join(', ') + '. Criteria: ' + (tracker.interviewPlan.systemDesignPrompt.evaluationCriteria || []).join(', '), 'system-design')}>
                                  {isEvaluating ? 'Evaluating...' : 'Submit for Review'}
                                </button>
                              </div>
                              {ev && (
                                <div className="prep-eval">
                                  <span className="prep-eval-score" style={{background: ev.score >= 7 ? 'var(--emerald-dim)' : ev.score >= 4 ? 'var(--amber-dim)' : 'var(--rose-dim)', color: ev.score >= 7 ? 'var(--emerald)' : ev.score >= 4 ? 'var(--amber)' : 'var(--rose)'}}>{ev.score}/{ev.maxScore}</span>
                                  <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:8}}>{ev.feedback}</div>
                                </div>
                              )}
                            </>); })()}
                            {revealedAnswers['sd'] && (
                              <div className="prep-answer" style={{marginTop:10}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--amber)',fontFamily:'var(--font-mono)',marginBottom:6}}>KEY TOPICS</div>
                                {(tracker.interviewPlan.systemDesignPrompt.keyTopics || []).map((t, i) => <div key={i} style={{fontSize:12,color:'var(--text-secondary)',marginBottom:2}}>• {t}</div>)}
                                <div style={{fontSize:11,fontWeight:700,color:'var(--emerald)',fontFamily:'var(--font-mono)',marginTop:10,marginBottom:6}}>EVALUATION CRITERIA</div>
                                {(tracker.interviewPlan.systemDesignPrompt.evaluationCriteria || []).map((t, i) => <div key={i} style={{fontSize:12,color:'var(--text-secondary)',marginBottom:2}}>• {t}</div>)}
                              </div>
                            )}
                          </div>
                        )}
                        {/* Company Insights */}
                        {tracker.interviewPlan.companyInsights && (
                          <div className="prep-card">
                            <span className="prep-card-cat" style={{background:'var(--orange-dim)',color:'var(--orange)',marginBottom:8,display:'inline-block'}}>Company Intel</span>
                            {Object.entries(tracker.interviewPlan.companyInsights).map(([k, v]) => v && (
                              <div key={k} style={{marginBottom:8}}>
                                <div style={{fontSize:11,fontWeight:700,color:'var(--text-muted)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:1,marginBottom:2}}>{k.replace(/([A-Z])/g, ' $1').trim()}</div>
                                <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.6}}>{v}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    )}

                    {prepTab === 'quiz' && (
                      <>
                        {quizSubmitted && quizScore && (
                          <div className="prep-card" style={{textAlign:'center',borderColor: quizScore.pct >= 70 ? 'rgba(52,211,153,0.3)' : 'rgba(251,113,133,0.3)'}}>
                            <div style={{fontSize:36,fontWeight:800,fontFamily:'var(--font-mono)',color: quizScore.pct >= 70 ? 'var(--emerald)' : 'var(--rose)'}}>{quizScore.pct}%</div>
                            <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:8}}>{quizScore.correct}/{quizScore.total} correct</div>
                            <div className="prep-score-bar"><div className="prep-score-fill" style={{width: quizScore.pct + '%', background: quizScore.pct >= 70 ? 'var(--emerald)' : 'var(--rose)'}} /></div>
                            <div style={{fontSize:12,color: quizScore.pct >= 70 ? 'var(--emerald)' : 'var(--rose)',fontFamily:'var(--font-mono)',fontWeight:600}}>
                              {quizScore.pct >= 90 ? 'Excellent — you\'re ready!' : quizScore.pct >= 70 ? 'Good — almost there!' : 'Keep studying — review the questions tab'}
                            </div>
                          </div>
                        )}
                        {(tracker.interviewPlan.quiz || []).map((q, i) => {
                          const answered = quizAnswers[i] !== undefined;
                          const submitted = quizSubmitted;
                          return (
                            <div key={'quiz'+i} className="prep-card">
                              <div style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',marginBottom:6}}>Question {i+1} of {tracker.interviewPlan.quiz.length}</div>
                              <div className="prep-q">{q.question}</div>
                              {(q.options || []).map((opt, j) => {
                                let cls = 'prep-quiz-option';
                                if (submitted && j === q.correctIndex) cls += ' correct';
                                else if (submitted && quizAnswers[i] === j && j !== q.correctIndex) cls += ' wrong';
                                else if (!submitted && quizAnswers[i] === j) cls += ' selected';
                                return (
                                  <div key={j} className={cls} onClick={() => { if (!submitted) { const updated = {...quizAnswers, [i]: j}; setQuizAnswers(updated); savePrepState({ quizAnswers: updated }); } }}>
                                    <span className="option-letter">{String.fromCharCode(65+j)}</span>
                                    <span>{opt.replace(/^[A-D]\)\s*/, '')}</span>
                                    {submitted && j === q.correctIndex && <Icons.check style={{width:14,height:14,color:'var(--emerald)',marginLeft:'auto'}} />}
                                    {submitted && quizAnswers[i] === j && j !== q.correctIndex && <Icons.x style={{width:14,height:14,color:'var(--rose)',marginLeft:'auto'}} />}
                                  </div>
                                );
                              })}
                              {submitted && q.explanation && <div className="prep-answer" style={{marginTop:8}}>{q.explanation}</div>}
                            </div>
                          );
                        })}
                        {!quizSubmitted ? (
                          <button className="btn btn-primary" style={{width:'100%',padding:'12px',fontSize:14}} onClick={() => { setQuizSubmitted(true); savePrepState({ quizSubmitted: true }); }} disabled={Object.keys(quizAnswers).length < (tracker.interviewPlan.quiz || []).length}>
                            Submit Quiz ({Object.keys(quizAnswers).length}/{(tracker.interviewPlan.quiz || []).length} answered)
                          </button>
                        ) : (
                          <button className="btn btn-secondary" style={{width:'100%',padding:'10px',fontSize:12}} onClick={() => { setQuizAnswers({}); setQuizSubmitted(false); savePrepState({ quizAnswers: {}, quizSubmitted: false }); }}>Retake Quiz</button>
                        )}
                      </>
                    )}

                    {prepTab === 'readiness' && (
                      <>
                        {readinessScore && (
                          <div className="prep-card" style={{textAlign:'center'}}>
                            <div style={{fontSize:36,fontWeight:800,fontFamily:'var(--font-mono)',color: readinessScore.pct >= 80 ? 'var(--emerald)' : readinessScore.pct >= 50 ? 'var(--amber)' : 'var(--rose)'}}>{readinessScore.pct}%</div>
                            <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:8}}>{readinessScore.done}/{readinessScore.total} items complete</div>
                            <div className="prep-score-bar"><div className="prep-score-fill" style={{width: readinessScore.pct + '%', background: readinessScore.pct >= 80 ? 'var(--emerald)' : readinessScore.pct >= 50 ? 'var(--amber)' : 'var(--rose)'}} /></div>
                          </div>
                        )}
                        <div className="prep-card">
                          {(tracker.interviewPlan.readinessChecklist || []).map((item, i) => (
                            <div key={i} className="prep-readiness-item">
                              <input type="checkbox" className="checkbox" checked={!!readinessChecks[i]} onChange={e => saveReadinessCheck(i, e.target.checked)} />
                              <span style={{flex:1,color: readinessChecks[i] ? 'var(--text-muted)' : 'var(--text)', textDecoration: readinessChecks[i] ? 'line-through' : 'none'}}>{item.item}</span>
                              <span className={`prep-card-cat ${item.category}`} style={{fontSize:9}}>{item.category}</span>
                            </div>
                          ))}
                        </div>
                        {isReady && stage === 'discovered' && selected.url && (
                          <button className="btn btn-primary" style={{width:'100%',padding:'14px',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}} onClick={() => { setStage('applied'); window.open(selected.url, '_blank'); }}>
                            <Icons.send style={{width:16,height:16}} /> You're Ready — Apply Now
                          </button>
                        )}
                        {isReady && !selected.url && stage === 'discovered' && (
                          <button className="btn btn-primary" style={{width:'100%',padding:'14px',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}} onClick={() => setStage('applied')}>
                            <Icons.send style={{width:16,height:16}} /> Mark as Applied
                          </button>
                        )}
                        {!isReady && (
                          <div style={{textAlign:'center',padding:'12px',fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>
                            {!quizScore ? 'Complete the quiz first' : quizScore.pct < 70 ? `Quiz score ${quizScore.pct}% — aim for 70%+` : ''}{' '}
                            {readinessScore && readinessScore.pct < 80 ? `Checklist ${readinessScore.pct}% — aim for 80%+` : ''}
                          </div>
                        )}
                      </>
                    )}
                    <button onClick={generatePlan} disabled={planLoading} style={{marginTop:8,background:'none',border:'1px dashed var(--border)',borderRadius:8,padding:'6px 14px',color:'var(--text-muted)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-mono)',display:'block',width:'100%',textAlign:'center'}}>
                      {planLoading ? 'Regenerating...' : 'Regenerate Prep Plan'}
                    </button>
                  </>
                ) : tracker?.interviewPlanRaw ? (
                  <div style={{background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:10,padding:'18px 20px'}}>
                    <div className="md-content" style={{fontSize:13}} dangerouslySetInnerHTML={{__html: marked.parse(tracker.interviewPlanRaw)}} />
                    <button onClick={generatePlan} disabled={planLoading} style={{marginTop:12,background:'none',border:'1px dashed var(--border)',borderRadius:8,padding:'6px 14px',color:'var(--text-muted)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-mono)'}}>
                      {planLoading ? 'Regenerating...' : 'Regenerate as Interactive Plan'}
                    </button>
                  </div>
                ) : (
                  <button onClick={generatePlan} disabled={planLoading} className="btn btn-secondary" style={{display:'flex',alignItems:'center',gap:8,fontSize:13,width:'100%',justifyContent:'center',padding:'14px 20px'}}>
                    {planLoading ? (
                      <><span className="dot-pulse" style={{display:'inline-flex',gap:4}}><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite',animationDelay:'0.2s'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite',animationDelay:'0.4s'}}/></span> Generating prep plan...</>
                    ) : (
                      <><Icons.zap style={{width:16,height:16,color:'var(--amber)'}} /> Generate Interview Prep Plan</>
                    )}
                  </button>
                )}
              </div>

              {/* Notes */}
              <div className="mc-section">
                <div className="mc-section-title"><Icons.fileText style={{width:14,height:14,color:'var(--violet)'}} /> Notes</div>
                <textarea className="mc-notes" value={tracker?.notes || ''} onChange={e => { ensureTracker(); updateNotes(e.target.value); }} placeholder="Recruiter name, referral contacts, prep thoughts..." />
              </div>

              {/* Timeline */}
              <div className="mc-section">
                <div className="mc-section-title"><Icons.calendar style={{width:14,height:14,color:'var(--text-muted)'}} /> Timeline</div>
                {(tracker?.timeline || []).map((t, i) => (
                  <div key={i} className="mc-timeline-item">
                    <div className="mc-timeline-dot" />
                    <span className="mc-timeline-date">{t.date?.split('T')[0]}</span>
                    <span className="mc-timeline-event">{t.event}</span>
                  </div>
                ))}
                <div className="mc-add-timeline">
                  <input style={{flex:1,background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'6px 10px',color:'var(--text)',fontFamily:'var(--font-display)',fontSize:12,outline:'none'}} value={newTimelineEvent} onChange={e => setNewTimelineEvent(e.target.value)} placeholder="Add event..." onKeyDown={e => e.key === 'Enter' && addTimelineEvent()} />
                  <button className="btn btn-secondary" style={{padding:'6px 12px',fontSize:11}} onClick={addTimelineEvent}>Add</button>
                </div>
              </div>

              {/* Action Buttons */}
              <div className="mc-actions">
                {selected.url && <a href={selected.url} target="_blank" rel="noopener" className="btn btn-link" style={{textDecoration:'none',display:'inline-flex',alignItems:'center',gap:6,fontSize:13}}><Icons.externalLink style={{width:14,height:14}} /> View Posting</a>}
                {selected.url && stage === 'discovered' && <button className="btn btn-primary" style={{fontSize:13,display:'flex',alignItems:'center',gap:6}} onClick={() => { setStage('applied'); window.open(selected.url, '_blank'); }}><Icons.send style={{width:14,height:14}} /> Apply</button>}
              </div>
            </>
          ) : (
            <div className="intel-right-empty">Select a role to view details</div>
          )}
        </div>
      </div>
    </>
  );
}

/* ===== PREP PLANS ===== */
function PrepPlans({ allRoles, roleTracker, setRoleTracker, setPage }) {
  const [selectedKey, setSelectedKey] = useState(null);
  const [prepTab, setPrepTab] = useState('questions');
  const [revealedAnswers, setRevealedAnswers] = useState({});
  const [quizAnswers, setQuizAnswers] = useState({});
  const [practiceAnswers, setPracticeAnswers] = useState({});
  const [evaluations, setEvaluations] = useState({});
  const [evaluatingKeys, setEvaluatingKeys] = useState({});
  const [quizSubmitted, setQuizSubmitted] = useState(false);
  const [readinessChecks, setReadinessChecks] = useState({});
  const saveTimer = useRef(null);

  // Build list of roles that have generated plans
  const roleMap = {};
  allRoles.forEach(r => { const key = `${r.company}|${r.role}`; if (!roleMap[key]) roleMap[key] = { ...r, key }; });

  const [planLoadingKeys, setPlanLoadingKeys] = useState({});

  const hasPlanAttempt = (t) => t.interviewPlan || t.interviewPlanRaw || (t.timeline || []).some(e => e.event && e.event.includes('prep plan'));

  const plansWithRoles = Object.entries(roleTracker)
    .filter(([_, t]) => hasPlanAttempt(t))
    .map(([key, t]) => {
      const role = roleMap[key] || { company: key.split('|')[0], role: key.split('|')[1], key };
      const isStructured = t.interviewPlan && typeof t.interviewPlan === 'object';
      const quizTotal = isStructured ? (t.interviewPlan.quiz || []).length : 0;
      const quizDone = t.quizSubmitted ? Object.values(t.quizAnswers || {}).length : 0;
      const quizCorrect = isStructured && t.quizSubmitted ? (t.interviewPlan.quiz || []).filter((q, i) => (t.quizAnswers || {})[i] === q.correctIndex).length : 0;
      const readinessTotal = isStructured ? (t.interviewPlan.readinessChecklist || []).length : 0;
      const readinessDone = Object.values(t.readinessChecks || {}).filter(Boolean).length;
      const questionsTotal = isStructured ? (t.interviewPlan.technicalQuestions || []).length + (t.interviewPlan.behavioralQuestions || []).length + (t.interviewPlan.systemDesignPrompt ? 1 : 0) : 0;
      const questionsRevealed = Object.keys(t.revealedAnswers || {}).length;
      return { key, role, tracker: t, plan: t.interviewPlan, isStructured, quizTotal, quizDone, quizCorrect, readinessTotal, readinessDone, questionsTotal, questionsRevealed, stage: t.stage || 'discovered' };
    })
    .sort((a, b) => (STAGES.indexOf(a.stage) - STAGES.indexOf(b.stage)));

  // Auto-select first plan
  useEffect(() => {
    if (!selectedKey && plansWithRoles.length > 0) setSelectedKey(plansWithRoles[0].key);
  }, [plansWithRoles.length]);

  // Load persisted prep state when switching plans
  useEffect(() => {
    const t = roleTracker[selectedKey];
    setRevealedAnswers(t?.revealedAnswers || {});
    setQuizAnswers(t?.quizAnswers || {});
    setQuizSubmitted(!!t?.quizSubmitted);
    setReadinessChecks(t?.readinessChecks || {});
    setPracticeAnswers(t?.practiceAnswers || {});
    setEvaluations(t?.evaluations || {});
    setEvaluatingKeys({});
    setPrepTab('questions');
  }, [selectedKey]);

  const saveTracker = (updated) => {
    setRoleTracker(updated);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { api.post('/api/role-tracker', updated); }, 500);
  };

  const savePrepState = (updates) => {
    const updated = { ...roleTracker, [selectedKey]: { ...roleTracker[selectedKey], ...updates } };
    saveTracker(updated);
  };

  const submitForReview = async (qKey, question, userAnswer, sampleAnswer, category) => {
    if (!userAnswer.trim() || evaluatingKeys[qKey]) return;
    setEvaluatingKeys(prev => ({ ...prev, [qKey]: true }));
    try {
      const result = await api.post('/api/evaluate-answer', { question, userAnswer, sampleAnswer, category });
      const updated = { ...evaluations, [qKey]: result };
      setEvaluations(updated);
      savePrepState({ evaluations: updated, practiceAnswers: { ...practiceAnswers } });
    } catch {
      // silent
    }
    setEvaluatingKeys(prev => { const n = { ...prev }; delete n[qKey]; return n; });
  };

  const updatePracticeAnswer = (qKey, value) => {
    const updated = { ...practiceAnswers, [qKey]: value };
    setPracticeAnswers(updated);
    // Debounce save
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => { savePrepState({ practiceAnswers: updated }); }, 1000);
  };

  const planLoading = !!planLoadingKeys[selectedKey];

  const regeneratePlan = async (roleKey) => {
    if (planLoadingKeys[roleKey]) return;
    setPlanLoadingKeys(prev => ({ ...prev, [roleKey]: true }));
    if (roleKey === selectedKey) {
      setRevealedAnswers({});
      setQuizAnswers({});
      setQuizSubmitted(false);
      setReadinessChecks({});
      setPracticeAnswers({});
      setEvaluations({});
    }
    const r = roleMap[roleKey] || { company: roleKey.split('|')[0], role: roleKey.split('|')[1] };
    const resumeFile = await api.get('/api/resume');
    try {
      const res = await api.post('/api/interview-plan', {
        roleKey,
        company: r.company,
        role: r.role,
        level: r.level || '',
        location: r.location || '',
        fit: r.fit || '',
        tips: '',
        resumeSummary: resumeFile?.summary || '',
        resumeSkills: resumeFile?.skills || [],
      });
      if (res.plan || res.fallbackMarkdown) {
        const t = { ...roleTracker };
        const entry = { ...t[roleKey], interviewPlan: res.plan || null, interviewPlanRaw: null, revealedAnswers: {}, quizAnswers: {}, quizSubmitted: false, readinessChecks: {} };
        if (res.fallbackMarkdown) entry.interviewPlanRaw = res.fallbackMarkdown;
        entry.timeline = [...(entry.timeline || []), { date: new Date().toISOString(), event: 'Interview prep plan regenerated' }];
        t[roleKey] = entry;
        saveTracker(t);
      }
    } catch {
      // silent fail
    }
    setPlanLoadingKeys(prev => { const next = { ...prev }; delete next[roleKey]; return next; });
  };

  const selectedPlan = plansWithRoles.find(p => p.key === selectedKey);
  const tracker = selectedPlan?.tracker;
  const plan = selectedPlan?.plan;
  const role = selectedPlan?.role;

  const quizScore = plan?.quiz && quizSubmitted ? (() => {
    const quiz = plan.quiz;
    const correct = quiz.filter((q, i) => quizAnswers[i] === q.correctIndex).length;
    return { correct, total: quiz.length, pct: Math.round((correct / quiz.length) * 100) };
  })() : null;

  const readinessScore = plan?.readinessChecklist ? (() => {
    const total = plan.readinessChecklist.length;
    const done = Object.values(readinessChecks).filter(Boolean).length;
    return { done, total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  })() : null;

  const isReady = quizScore && quizScore.pct >= 70 && readinessScore && readinessScore.pct >= 80;

  const getProgressColor = (pct) => pct >= 80 ? 'var(--emerald)' : pct >= 50 ? 'var(--amber)' : 'var(--text-muted)';
  const getOverallProgress = (p) => {
    let score = 0, total = 0;
    if (p.questionsTotal > 0) { score += (p.questionsRevealed / p.questionsTotal) * 33; total += 33; }
    if (p.quizTotal > 0) { score += (p.tracker.quizSubmitted ? (p.quizCorrect / p.quizTotal) * 33 : 0); total += 33; }
    if (p.readinessTotal > 0) { score += (p.readinessDone / p.readinessTotal) * 34; total += 34; }
    return total > 0 ? Math.round(score) : 0;
  };

  return (
    <>
      <div className="codelab-toolbar anim-enter">
        <h2>Interview Prep Plans</h2>
        <div style={{flex:1}} />
        <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{plansWithRoles.length} plan{plansWithRoles.length !== 1 ? 's' : ''} generated</span>
      </div>

      {plansWithRoles.length === 0 ? (
        <div className="anim-enter anim-delay-1" style={{textAlign:'center',padding:'80px 20px'}}>
          <Icons.clipboard style={{width:48,height:48,color:'var(--text-muted)',marginBottom:16}} />
          <h3 style={{fontSize:18,fontWeight:600,color:'var(--text-secondary)',marginBottom:8}}>No Prep Plans Yet</h3>
          <p style={{fontSize:14,color:'var(--text-muted)',maxWidth:400,margin:'0 auto 20px'}}>Generate interview prep plans from the Intel page by selecting a role and clicking "Generate Interview Prep Plan".</p>
          <button className="btn btn-primary" style={{padding:'10px 24px',fontSize:14}} onClick={() => setPage('intel')}>
            <Icons.radar style={{width:14,height:14,display:'inline',verticalAlign:'middle',marginRight:6}} />Go to Intel
          </button>
        </div>
      ) : (
        <div className="intel-split anim-enter anim-delay-1" style={{border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden'}}>
          {/* Left Panel - Plan List */}
          <div className="intel-left">
            <div className="intel-left-header">
              <div style={{padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>All Plans</span>
                {plansWithRoles.some(p => !p.isStructured) && (
                  <button onClick={() => { const toGen = plansWithRoles.filter(p => !p.isStructured && !planLoadingKeys[p.key]); toGen.forEach(p => regeneratePlan(p.key)); }} disabled={Object.keys(planLoadingKeys).length > 0} style={{background:'none',border:'1px solid var(--amber)',borderRadius:6,padding:'3px 10px',color:'var(--amber)',cursor:'pointer',fontSize:10,fontFamily:'var(--font-mono)',fontWeight:600,transition:'all 0.15s',opacity: Object.keys(planLoadingKeys).length > 0 ? 0.5 : 1}}>
                    Generate All
                  </button>
                )}
              </div>
            </div>
            <div className="intel-role-list">
              {plansWithRoles.map(p => {
                const progress = getOverallProgress(p);
                const isLoading = !!planLoadingKeys[p.key];
                return (
                  <div key={p.key} className={`intel-role-item ${selectedKey===p.key?'active':''}`} onClick={() => setSelectedKey(p.key)}>
                    <div className="iri-company">
                      <span className={`stage-dot stage-${p.stage}`} />
                      {p.role.company}
                      {!p.isStructured && !isLoading && (
                        <button onClick={e => { e.stopPropagation(); regeneratePlan(p.key); }} style={{marginLeft:'auto',background:'var(--amber)',border:'none',borderRadius:4,padding:'2px 8px',color:'var(--bg-deep)',cursor:'pointer',fontSize:9,fontFamily:'var(--font-mono)',fontWeight:700}}>
                          GEN
                        </button>
                      )}
                    </div>
                    <div className="iri-title">{p.role.role}</div>
                    {isLoading ? (

                          <span style={{flex:1,color: readinessChecks[i] ? 'var(--text-muted)' : 'var(--text)', textDecoration: readinessChecks[i] ? 'line-through' : 'none'}}>{item.item}</span>

                    {isReady && (
                      <div className="prep-card" style={{textAlign:'center',borderColor:'rgba(52,211,153,0.3)',background:'rgba(52,211,153,0.05)'}}>

                        <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:12}}>Quiz passed and readiness checklist complete.</div>

  );

/* ===== HISTORY ===== */
function Calendar({ progress }) {
  const [activity, setActivity] = useState({});
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(null);

  useEffect(() => { api.get('/api/activity').then(setActivity); }, []);

  const today = new Date();
  const viewDate = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleString('default', { month: 'long', year: 'numeric' });

  // Build calendar grid
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  const cells = [];
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - firstDay + 1;
    if (dayNum < 1) {
      const d = daysInPrevMonth + dayNum;
      const dt = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({ day: d, date: dt, otherMonth: true });
    } else if (dayNum > daysInMonth) {
      const d = dayNum - daysInMonth;
      const m = month + 2;
      const dt = `${m > 12 ? year+1 : year}-${String(m > 12 ? 1 : m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      cells.push({ day: d, date: dt, otherMonth: true });
    } else {
      const dt = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      cells.push({ day: dayNum, date: dt, otherMonth: false });
    }
  }

  const todayStr = today.toISOString().split('T')[0];

  const getIntensity = (date) => {
    const a = activity[date];
    if (!a) return 0;
    let score = 0;
    if (a.tasksCompleted > 0) score += Math.min(a.tasksCompleted, 3);
    if (a.problemsSolved?.length > 0) score += a.problemsSolved.length * 2;
    if (a.quizAnswered > 0) score += 1;
    if (score >= 6) return 4;
    if (score >= 4) return 3;
    if (score >= 2) return 2;
    if (score >= 1) return 1;
    return 0;
  };

  // Stats for current month
  const monthDates = Object.keys(activity).filter(d => d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  const practiceDays = monthDates.filter(d => getIntensity(d) > 0).length;
  const monthProblems = monthDates.reduce((sum, d) => sum + (activity[d]?.problemsSolved?.length || 0), 0);
  const monthTasks = monthDates.reduce((sum, d) => sum + (activity[d]?.tasksCompleted || 0), 0);

  const sel = selectedDate ? activity[selectedDate] : null;

  return (
    <>
      <div className="page-header anim-enter">
        <h2>Practice Calendar</h2>
        <div className="greeting-sub" style={{display:'flex',alignItems:'center',gap:12,marginTop:6}}>
          <span className="cal-streak"><Icons.flame style={{width:14,height:14}} /> {progress.streak || 0} day streak</span>
        </div>
      </div>

      <div className="stats-row anim-enter anim-delay-1">
        <div className="stat-card"><div className="value">{practiceDays}</div><div className="label">Days This Month</div></div>
        <div className="stat-card emerald"><div className="value">{monthTasks}</div><div className="label">Tasks Done</div></div>
        <div className="stat-card cyan"><div className="value">{monthProblems}</div><div className="label">Problems Solved</div></div>
        <div className="stat-card violet"><div className="value">{Object.keys(activity).filter(d => getIntensity(d) > 0).length}</div><div className="label">Total Days</div></div>
      </div>

      <div className="card anim-enter anim-delay-2">
        <div className="cal-month-nav">
          <button className="cal-nav-btn" onClick={() => setMonthOffset(m => m - 1)}><Icons.chevLeft /></button>
          <h3>{monthName}</h3>
          <button className="cal-nav-btn" onClick={() => setMonthOffset(m => m + 1)} disabled={monthOffset >= 0}><Icons.chevRight /></button>
        </div>

        <div className="cal-grid">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="cal-weekday">{d}</div>)}
          {cells.map((c, i) => {
            const intensity = c.otherMonth ? 0 : getIntensity(c.date);
            const isToday = c.date === todayStr;
            const isSelected = c.date === selectedDate;
            return (
              <div key={i}
                className={`cal-day ${c.otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${intensity > 0 ? 'has-activity' : ''}`}
                onClick={() => !c.otherMonth && setSelectedDate(c.date === selectedDate ? null : c.date)}>
                {c.day}
                {!c.otherMonth && <div className={`cal-dot cal-intensity-${intensity}`} />}
              </div>
            );
          })}
        </div>
      </div>

      {selectedDate && sel && (
        <div className="card anim-enter">
          <div className="cal-detail">
            <div className="cal-detail-header">
              <Icons.calendarIcon style={{width:16,height:16,color:'var(--amber)'}} />
              <span className="cal-detail-date">{selectedDate}</span>
            </div>
            <div className="cal-detail-grid">
              <div className="cal-detail-stat">
                <div className="cds-value" style={{color:'var(--emerald)'}}>{sel.tasksCompleted}/{sel.tasksTotal}</div>
                <div className="cds-label">Tasks</div>
              </div>
              <div className="cal-detail-stat">
                <div className="cds-value" style={{color:'var(--cyan)'}}>{sel.problemsSolved?.length || 0}</div>
                <div className="cds-label">Problems</div>
              </div>
              <div className="cal-detail-stat">
                <div className="cds-value" style={{color:'var(--amber)'}}>{sel.quizAnswered > 0 ? Math.round((sel.quizCorrect/sel.quizAnswered)*100) : 0}%</div>
                <div className="cds-label">Quiz ({sel.quizCorrect}/{sel.quizAnswered})</div>
              </div>
            </div>
            {sel.problemsSolved?.length > 0 && (
              <div style={{marginTop:8}}>
                <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1.5,fontFamily:'var(--font-mono)',fontWeight:600,marginBottom:8}}>Problems Solved</div>
                {sel.problemsSolved.map((p,i) => <span key={i} className="cal-problem-tag">{p.replace(/-/g,' ')}</span>)}
              </div>
            )}
            {sel.events?.length > 0 && (
              <div style={{marginTop:16}}>
                <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1.5,fontFamily:'var(--font-mono)',fontWeight:600,marginBottom:10}}>Activity Timeline</div>
                {sel.events.map((ev, i) => {
                  const time = new Date(ev.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
                  const labels = {
                    task_update: ev.detail?.completed ? 'Completed task' : 'Uncompleted task',
                    quiz_answer: ev.detail?.isCorrect ? 'Quiz: correct answer' : 'Quiz: wrong answer',
                    problem_solved: 'Solved problem',
                    code_saved: 'Saved code',
                    code_review: 'Asked AI for review',
                    resume_update: 'Updated resume',
                    role_saved: 'Saved role',
                    role_skipped: 'Skipped role',
                    role_applied: 'Applied to role',
                  };
                  const colors = {
                    task_update: ev.detail?.completed ? 'var(--emerald)' : 'var(--text-muted)',
                    quiz_answer: ev.detail?.isCorrect ? 'var(--emerald)' : 'var(--rose)',
                    problem_solved: 'var(--cyan)',
                    code_saved: 'var(--violet)',
                    code_review: 'var(--amber)',
                    resume_update: 'var(--blue)',
                    role_saved: 'var(--amber)',
                    role_skipped: 'var(--text-muted)',
                    role_applied: 'var(--emerald)',
                  };
                  const label = labels[ev.type] || ev.type;
                  const color = colors[ev.type] || 'var(--text-secondary)';
                  const detail = ev.detail?.task || ev.detail?.problems?.join(', ')?.replace(/-/g,' ') || ev.detail?.roles?.map(r => r.split('|')[0]).join(', ') || ev.detail?.problemTitle || '';
                  return (
                    <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:8,fontSize:12}}>
                      <span style={{fontFamily:'var(--font-mono)',color:'var(--text-muted)',width:50,flexShrink:0}}>{time}</span>
                      <div style={{width:8,height:8,borderRadius:'50%',background:color,marginTop:4,flexShrink:0}} />
                      <div>
                        <span style={{color,fontWeight:600}}>{label}</span>
                        {detail && <span style={{color:'var(--text-muted)',marginLeft:6}}>{detail}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {selectedDate && !sel && (
        <div className="card anim-enter">
          <div className="cal-detail" style={{textAlign:'center',color:'var(--text-muted)',padding:'32px 24px'}}>
            <p>No practice recorded on {selectedDate}</p>
          </div>
        </div>
      )}
    </>
  );
}
