function SystemDesign() {
  const [topics, setTopics] = useState([]);
  const [selectedTopic, setSelectedTopic] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [starting, setStarting] = useState(false);
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => {
    api.get('/api/sd-topics').then(setTopics);
  }, []);

  useEffect(() => {
    if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  const selectTopic = async (topic) => {
    setSelectedTopic(topic);
    setMessages([]);
    setInput('');
    const conv = await api.get(`/api/sd-conversation/${topic.id}`);
    setMessages(conv.messages || []);
  };

  const startInterview = async () => {
    if (!selectedTopic) return;
    setStarting(true);
    setMessages([]);
    try {
      // Delete old conversation first
      await fetch(`/api/sd-conversation/${selectedTopic.id}`, { method: 'DELETE' });
      const res = await api.post(`/api/sd-conversation/${selectedTopic.id}`, { userMessage: '' });
      setMessages(res.messages || []);
      // Refresh topic list to show hasConversation
      api.get('/api/sd-topics').then(setTopics);
    } catch {
      setMessages([{ role: 'assistant', content: 'Failed to start interview. Check the active runtime CLI.', timestamp: new Date().toISOString() }]);
    }
    setStarting(false);
  };

  const sendMessage = async () => {
    if (!input.trim() || !selectedTopic || loading) return;
    const msg = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role: 'user', content: msg, timestamp: new Date().toISOString() }]);
    setLoading(true);
    try {
      const res = await api.post(`/api/sd-conversation/${selectedTopic.id}`, { userMessage: msg });
      setMessages(res.messages || []);
    } catch {
      setMessages(prev => [...prev, { role: 'assistant', content: 'Failed to get response. Check the active runtime CLI.', timestamp: new Date().toISOString() }]);
    }
    setLoading(false);
    if (textareaRef.current) textareaRef.current.focus();
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  const autoResize = (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  };

  const exchangeCount = messages.filter(m => m.role === 'user' && m.content !== '[Interview started]').length;

  return (
    <>
      <div className="codelab-toolbar anim-enter">
        <h2>System Design</h2>
        <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>Mock Interview</span>
      </div>

      <div className="sd-layout anim-enter anim-delay-1">
        {/* Topic Sidebar */}
        <div className="sd-sidebar">
          <h3>Topics</h3>
          {topics.map(t => (
            <div key={t.id} className={`sd-topic ${selectedTopic?.id === t.id ? 'active' : ''}`} onClick={() => selectTopic(t)}>
              <div className="sd-topic-title">
                {t.title}
                {t.hasConversation && <span className="sd-resume-badge">in progress</span>}
              </div>
              <div className="sd-topic-desc">{t.description}</div>
            </div>
          ))}
        </div>

        {/* Chat Area */}
        <div className="sd-chat-area">
          {!selectedTopic ? (
            <div className="sd-empty-state">
              <Icons.target />
              <p style={{fontSize:16,fontWeight:600,color:'var(--text-secondary)'}}>Select a topic to start</p>
              <p style={{fontSize:13}}>Choose a system design problem from the left to begin your mock interview.</p>
            </div>
          ) : messages.length === 0 ? (
            <>
              <div className="sd-chat-header">
                <h3>{selectedTopic.title}</h3>
              </div>
              <div className="sd-empty-state">
                <Icons.messageCircle style={{width:48,height:48,opacity:0.3}} />
                <p style={{fontSize:16,fontWeight:600,color:'var(--text-secondary)'}}>Ready to begin?</p>
                <p style={{fontSize:13,maxWidth:400}}>{selectedTopic.description}</p>
                <p style={{fontSize:12,marginTop:4}}>The interviewer will present the problem and guide you through the design process.</p>
                <button className="btn btn-primary" onClick={startInterview} disabled={starting} style={{marginTop:12,padding:'10px 28px',fontSize:14,display:'flex',alignItems:'center',gap:8}}>
                  {starting ? <><div className="dot-pulse" style={{display:'inline-flex',gap:4}}><span style={{width:5,height:5,borderRadius:'50%',background:'var(--bg-deep)',animation:'chatDot 1.2s infinite'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--bg-deep)',animation:'chatDot 1.2s infinite',animationDelay:'0.2s'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--bg-deep)',animation:'chatDot 1.2s infinite',animationDelay:'0.4s'}}/></div> Starting...</> : <><Icons.play style={{width:16,height:16}} /> Start Interview</>}
                </button>
              </div>
            </>
          ) : (
            <>
              <div className="sd-chat-header">
                <h3>{selectedTopic.title}</h3>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span className="sd-exchange-count">{exchangeCount} exchange{exchangeCount !== 1 ? 's' : ''}</span>
                  <button className="btn btn-secondary" onClick={startInterview} disabled={starting || loading} style={{padding:'6px 12px',fontSize:11}}>Restart</button>
                </div>
              </div>
              <div className="sd-messages">
                {messages.filter(m => m.content !== '[Interview started]').map((m, i) => (
                  <div key={i} className={`sd-msg ${m.role}`}>
                    <div className="sd-bubble" dangerouslySetInnerHTML={m.role === 'assistant' ? {__html: marked.parse(m.content)} : undefined}>
                      {m.role === 'user' ? m.content : undefined}
                    </div>
                  </div>
                ))}
                {loading && (
                  <div className="sd-msg assistant">
                    <div className="sd-bubble" style={{display:'flex',alignItems:'center',gap:8,color:'var(--text-muted)',fontSize:12}}>
                      <div className="dot-pulse" style={{display:'inline-flex',gap:4}}><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite',animationDelay:'0.2s'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'var(--amber)',animation:'chatDot 1.2s infinite',animationDelay:'0.4s'}}/></div>
                      Interviewer is thinking...
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
              <div className="sd-input-area">
                <textarea ref={textareaRef} value={input} onChange={e => { setInput(e.target.value); autoResize(e); }} onKeyDown={handleKeyDown} placeholder="Type your response... (Enter to send, Shift+Enter for new line)" rows={1} disabled={loading} />
                <button className="btn btn-primary" onClick={sendMessage} disabled={!input.trim() || loading} style={{padding:'10px 20px',fontSize:14,flexShrink:0}}>Send</button>
              </div>
            </>
          )}
        </div>
      </div>
    </>
  );
}

function Behavioral() {
  const [questions, setQuestions] = useState([]);
  const [selectedIdx, setSelectedIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [evaluations, setEvaluations] = useState({});
  const [evaluatingKey, setEvaluatingKey] = useState(null);
  const [revealedFrameworks, setRevealedFrameworks] = useState({});
  const [loading, setLoading] = useState(true);
  const [resumeData, setResumeData] = useState(null);
  // Draft generation state
  const [draftMode, setDraftMode] = useState({}); // key -> 'idle'|'generating'|'asking'|'done'
  const [draftQuestions, setDraftQuestions] = useState({}); // key -> [questions from Claude]
  const [draftResponses, setDraftResponses] = useState({}); // key -> {q0: 'answer', q1: 'answer', ...}
  const [generatingAll, setGeneratingAll] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    Promise.all([
      api.get('/api/tasks'),
      api.get('/api/behavioral/answers'),
      api.get('/api/resume'),
    ]).then(([allTaskDays, savedAnswers, resume]) => {
      const seen = new Set();
      const bqs = [];
      (allTaskDays || []).forEach(day => {
        (day.tasks || []).filter(t => t.category === 'behavioral').forEach(t => {
          const key = t.text.toLowerCase().trim();
          if (!seen.has(key)) {
            seen.add(key);
            bqs.push({ text: t.text, content: t.content || '', date: day.date, key: 'bq_' + bqs.length });
          }
        });
      });
      setQuestions(bqs);
      const restoredAnswers = {};
      const restoredEvals = {};
      Object.entries(savedAnswers || {}).forEach(([k, v]) => {
        if (v.answer) restoredAnswers[k] = v.answer;
        if (v.evaluation) restoredEvals[k] = v.evaluation;
      });
      setAnswers(restoredAnswers);
      setEvaluations(restoredEvals);
      setResumeData(resume);
      setLoading(false);
    });
  }, []);

  const saveAnswer = (key, answer) => {
    api.post('/api/behavioral/answers', { key, answer });
  };

  const updateAnswer = (key, value) => {
    const updated = { ...answers, [key]: value };
    setAnswers(updated);
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => saveAnswer(key, value), 1000);
  };

  const submitForReview = async (q) => {
    const key = q.key;
    const userAnswer = answers[key];
    if (!userAnswer?.trim() || evaluatingKey === key) return;
    setEvaluatingKey(key);
    try {
      const result = await api.post('/api/evaluate-answer', {
        question: q.text,
        userAnswer,
        sampleAnswer: q.content || 'Use STAR framework: Situation, Task, Action, Result. Focus on leadership, impact, and quantifiable outcomes.',
        category: 'behavioral'
      });
      const updated = { ...evaluations, [key]: result };
      setEvaluations(updated);
      api.post('/api/behavioral/answers', { key, answer: userAnswer, evaluation: result });
    } catch (e) { console.error('Evaluation failed:', e); }
    setEvaluatingKey(null);
  };

  const generateDraft = async (q, userContext) => {
    const key = q.key;
    setDraftMode(prev => ({ ...prev, [key]: 'generating' }));
    try {
      const result = await api.post('/api/behavioral/generate-draft', {
        question: q.text,
        resumeData,
        userContext: userContext || null,
      });
      if (result.error) {
        setDraftMode(prev => ({ ...prev, [key]: 'idle' }));
        return;
      }
      if (result.needsMoreInfo && result.questions) {
        setDraftQuestions(prev => ({ ...prev, [key]: result.questions }));
        setDraftMode(prev => ({ ...prev, [key]: 'asking' }));
      } else if (result.draft) {
        updateAnswer(key, result.draft);
        setDraftMode(prev => ({ ...prev, [key]: 'done' }));
      }
    } catch (e) {
      console.error('Draft generation failed:', e);
      setDraftMode(prev => ({ ...prev, [key]: 'idle' }));
    }
  };

  const submitDraftResponses = async (q) => {
    const key = q.key;
    const qs = draftQuestions[key] || [];
    const resps = draftResponses[key] || {};
    const contextParts = qs.map((question, i) => `Q: ${question}\nA: ${resps['q'+i] || '(not answered)'}`);
    await generateDraft(q, contextParts.join('\n\n'));
  };

  const generateAllDrafts = async () => {
    setGeneratingAll(true);
    for (const q of questions) {
      if (!(answers[q.key]?.trim())) {
        await generateDraft(q);
      }
    }
    setGeneratingAll(false);
  };

  const selected = questions[selectedIdx];

  if (loading) return <div className="page-header anim-enter"><h2>Behavioral Practice</h2><p style={{color:'var(--text-muted)',marginTop:8}}>Loading questions...</p></div>;

  if (questions.length === 0) return (
    <div className="page-header anim-enter">
      <h2>Behavioral Practice</h2>
      <div className="card" style={{marginTop:20,textAlign:'center',padding:'60px 40px'}}>
        <Icons.messageCircle style={{width:48,height:48,color:'var(--text-muted)',marginBottom:16}} />
        <h3 style={{color:'var(--text-secondary)',fontSize:16,fontWeight:500,marginBottom:8,textTransform:'none',letterSpacing:0}}>No behavioral questions yet</h3>
        <p style={{color:'var(--text-muted)',fontSize:13}}>Behavioral tasks from your daily task runs will appear here for practice.</p>
      </div>
    </div>
  );

  const completedCount = questions.filter(q => evaluations[q.key] && evaluations[q.key].score >= 6).length;
  const unansweredCount = questions.filter(q => !(answers[q.key]?.trim())).length;

  return (
    <>
      <div className="page-header anim-enter">
        <h2>Behavioral Practice</h2>
        <div className="greeting-sub">{completedCount}/{questions.length} practiced &middot; Write STAR responses and get AI feedback</div>
      </div>
      <div className="intel-split anim-enter anim-delay-1" style={{display:'flex',gap:0,height:'calc(100vh - 160px)',overflow:'hidden'}}>
        <div className="intel-left" style={{width:320,minWidth:280,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>Questions ({questions.length})</span>
            {unansweredCount > 0 && (
              <button onClick={generateAllDrafts} disabled={generatingAll} style={{background:'none',border:'1px solid var(--cyan)',borderRadius:6,padding:'3px 10px',color:'var(--cyan)',cursor:'pointer',fontSize:10,fontFamily:'var(--font-mono)',fontWeight:600,opacity:generatingAll?0.5:1}}>
                {generatingAll ? 'Generating...' : 'Draft All'}
              </button>
            )}
          </div>
          <div style={{flex:1,overflowY:'auto'}}>
            {questions.map((q, i) => {
              const ev = evaluations[q.key];
              const hasAnswer = !!(answers[q.key]?.trim());
              const mode = draftMode[q.key];
              return (
                <div key={q.key} className={`intel-role-item ${selectedIdx===i?'active':''}`} onClick={() => setSelectedIdx(i)} style={{padding:'14px 16px',cursor:'pointer'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    {ev && ev.score >= 6 ? (
                      <Icons.check style={{width:14,height:14,color:'var(--emerald)',flexShrink:0}} />
                    ) : hasAnswer ? (
                      <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid var(--amber)',flexShrink:0}} />
                    ) : mode === 'generating' ? (
                      <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid var(--cyan)',flexShrink:0,animation:'pulse-dot 1.5s infinite'}} />
                    ) : (
                      <div style={{width:14,height:14,borderRadius:'50%',border:'2px solid var(--text-muted)',flexShrink:0}} />
                    )}
                    <span style={{fontSize:13,color:'var(--text)',fontWeight:500,lineHeight:1.3,flex:1}}>{q.text}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:22}}>
                    <span style={{fontSize:10,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{q.date}</span>
                    {mode === 'generating' && <span style={{fontSize:10,color:'var(--cyan)',fontFamily:'var(--font-mono)'}}>drafting...</span>}
                    {mode === 'asking' && <span style={{fontSize:10,color:'var(--violet)',fontFamily:'var(--font-mono)'}}>needs input</span>}
                    {ev && <span style={{fontSize:10,fontFamily:'var(--font-mono)',fontWeight:700,color: ev.score >= 7 ? 'var(--emerald)' : ev.score >= 4 ? 'var(--amber)' : 'var(--rose)'}}>{ev.score}/{ev.maxScore}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="intel-right" style={{flex:1,overflowY:'auto',padding:28}}>
          {selected && (() => {
            const key = selected.key;
            const ev = evaluations[key];
            const isEvaluating = evaluatingKey === key;
            const mode = draftMode[key] || 'idle';
            const askQuestions = draftQuestions[key] || [];
            const responses = draftResponses[key] || {};
            return (
              <div>
                <div style={{marginBottom:20}}>
                  <span className="prep-card-cat behavioral" style={{display:'inline-block',marginBottom:10}}>behavioral</span>
                  <h3 style={{fontSize:18,fontWeight:600,color:'var(--text)',lineHeight:1.4,marginBottom:0,textTransform:'none',letterSpacing:0}}>{selected.text}</h3>
                </div>

                {selected.content && (
                  <div style={{marginBottom:24}}>
                    {!revealedFrameworks[key] ? (
                      <button className="prep-reveal-btn" onClick={() => setRevealedFrameworks(prev => ({...prev, [key]: true}))}>
                        Show Guidance & STAR Framework
                      </button>
                    ) : (
                      <div className="card" style={{background:'var(--bg-surface)',padding:20}}>
                        <div style={{fontSize:13,lineHeight:1.8,color:'var(--text-secondary)'}} dangerouslySetInnerHTML={{__html: marked.parse(selected.content)}} />
                        <button style={{marginTop:12,background:'none',border:'none',color:'var(--text-muted)',fontSize:11,cursor:'pointer',fontFamily:'var(--font-mono)'}} onClick={() => setRevealedFrameworks(prev => ({...prev, [key]: false}))}>
                          Hide guidance
                        </button>
                      </div>
                    )}
                  </div>
                )}

                {/* Q&A Flow - Claude needs more info */}
                {mode === 'asking' && askQuestions.length > 0 && (
                  <div className="card" style={{background:'var(--bg-surface)',padding:20,marginBottom:24,borderLeft:'3px solid var(--violet)'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'var(--violet)',fontFamily:'var(--font-mono)',marginBottom:12,textTransform:'uppercase',letterSpacing:1}}>
                      <Icons.messageCircle style={{width:14,height:14,display:'inline',verticalAlign:'middle',marginRight:6}} />
                      Help me craft your answer
                    </div>
                    <div style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16,lineHeight:1.6}}>
                      I need a bit more context about your experience to write a great STAR response. Answer these questions in your own words:
                    </div>
                    {askQuestions.map((q, qi) => (
                      <div key={qi} style={{marginBottom:16}}>
                        <label style={{fontSize:13,color:'var(--text)',fontWeight:500,marginBottom:6,display:'block'}}>{qi+1}. {q}</label>
                        <textarea
                          className="prep-textarea"
                          style={{minHeight:80,fontSize:13}}
                          placeholder="Your answer..."
                          value={responses['q'+qi] || ''}
                          onChange={e => setDraftResponses(prev => ({ ...prev, [key]: { ...(prev[key] || {}), ['q'+qi]: e.target.value } }))}
                        />
                      </div>
                    ))}
                    <div className="prep-actions">
                      <button className="btn btn-primary" onClick={() => submitDraftResponses(selected)}
                        disabled={!askQuestions.some((_, qi) => (responses['q'+qi] || '').trim())}
                        style={{padding:'10px 20px'}}>
                        <Icons.zap style={{width:14,height:14}} /> Generate My STAR Answer
                      </button>
                      <button className="btn btn-secondary" onClick={() => setDraftMode(prev => ({ ...prev, [key]: 'idle' }))} style={{padding:'10px 16px'}}>
                        Skip, I'll write it myself
                      </button>
                    </div>
                  </div>
                )}

                <div style={{marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                    <label style={{fontSize:11,fontWeight:700,color:'var(--amber)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:1}}>Your STAR Response</label>
                    {!(answers[key]?.trim()) && mode !== 'generating' && mode !== 'asking' && (
                      <button onClick={() => generateDraft(selected)} style={{background:'none',border:'1px solid var(--cyan)',borderRadius:6,padding:'4px 12px',color:'var(--cyan)',cursor:'pointer',fontSize:11,fontFamily:'var(--font-mono)',fontWeight:600,display:'flex',alignItems:'center',gap:6}}>
                        <Icons.zap style={{width:12,height:12}} /> Generate Draft from Resume
                      </button>
                    )}
                    {mode === 'generating' && (
                      <span style={{fontSize:11,color:'var(--cyan)',fontFamily:'var(--font-mono)',display:'flex',alignItems:'center',gap:6}}>
                        <span style={{display:'inline-flex',gap:3}}><span style={{width:4,height:4,borderRadius:'50%',background:'var(--cyan)',animation:'chatDot 1.2s infinite'}}/><span style={{width:4,height:4,borderRadius:'50%',background:'var(--cyan)',animation:'chatDot 1.2s infinite',animationDelay:'0.2s'}}/><span style={{width:4,height:4,borderRadius:'50%',background:'var(--cyan)',animation:'chatDot 1.2s infinite',animationDelay:'0.4s'}}/></span>
                        Generating draft...
                      </span>
                    )}
                  </div>
                  <textarea
                    className="prep-textarea"
                    style={{minHeight:200,fontSize:14,lineHeight:1.7}}
                    placeholder={"Situation: Set the scene — what was the context?\n\nTask: What was your specific responsibility?\n\nAction: What did YOU do? (Be specific about your contributions)\n\nResult: What was the outcome? (Quantify if possible)"}
                    value={answers[key] || ''}
                    onChange={e => updateAnswer(key, e.target.value)}
                  />
                </div>

                <div className="prep-actions" style={{marginBottom:20}}>
                  <button className="btn btn-primary" disabled={!(answers[key] || '').trim() || isEvaluating} onClick={() => submitForReview(selected)} style={{padding:'12px 24px',fontSize:14}}>
                    {isEvaluating ? (
                      <><span style={{display:'inline-flex',gap:4}}><span style={{width:5,height:5,borderRadius:'50%',background:'#fff',animation:'chatDot 1.2s infinite'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'#fff',animation:'chatDot 1.2s infinite',animationDelay:'0.2s'}}/><span style={{width:5,height:5,borderRadius:'50%',background:'#fff',animation:'chatDot 1.2s infinite',animationDelay:'0.4s'}}/></span> Evaluating...</>
                    ) : (
                      <><Icons.zap style={{width:14,height:14}} /> Submit for Review</>
                    )}
                  </button>
                  {(answers[key] || '').trim() && mode === 'done' && (
                    <button onClick={() => { setDraftMode(prev => ({ ...prev, [key]: 'idle' })); generateDraft(selected); }} style={{background:'none',border:'1px solid var(--cyan)',borderRadius:6,padding:'8px 16px',color:'var(--cyan)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-mono)',fontWeight:600}}>
                      Regenerate Draft
                    </button>
                  )}
                  {(answers[key] || '').trim() && <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',alignSelf:'center'}}>Auto-saved</span>}
                </div>

                {ev && (
                  <div className="prep-eval" style={{marginBottom:24}}>
                    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                      <span className="prep-eval-score" style={{background: ev.score >= 7 ? 'var(--emerald-dim)' : ev.score >= 4 ? 'var(--amber-dim)' : 'var(--rose-dim)', color: ev.score >= 7 ? 'var(--emerald)' : ev.score >= 4 ? 'var(--amber)' : 'var(--rose)', fontSize:16,padding:'6px 14px'}}>{ev.score}/{ev.maxScore}</span>
                      <span style={{fontSize:12,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{ev.score >= 8 ? 'Excellent' : ev.score >= 6 ? 'Good' : ev.score >= 4 ? 'Needs Work' : 'Keep Practicing'}</span>
                    </div>
                    <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,marginBottom:12}}>{ev.feedback}</div>
                    {ev.strengths?.length > 0 && (
                      <div style={{marginBottom:10}}>
                        <span style={{fontSize:10,fontWeight:700,color:'var(--emerald)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:1}}>Strengths</span>
                        <ul className="prep-eval-list">{ev.strengths.map((s,j) => <li key={j}>{s}</li>)}</ul>
                      </div>
                    )}
                    {ev.improvements?.length > 0 && (
                      <div>
                        <span style={{fontSize:10,fontWeight:700,color:'var(--amber)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:1}}>Areas to Improve</span>
                        <ul className="prep-eval-list">{ev.improvements.map((s,j) => <li key={j}>{s}</li>)}</ul>
                      </div>
                    )}
                  </div>
                )}

                {ev && ev.score < 6 && (
                  <div className="card" style={{background:'var(--bg-surface)',padding:16,borderLeft:'3px solid var(--amber)'}}>
                    <div style={{fontSize:12,fontWeight:600,color:'var(--amber)',marginBottom:6,fontFamily:'var(--font-mono)'}}>TIP</div>
                    <div style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.6}}>
                      Revise your answer addressing the feedback above, then submit again. Focus on being specific with your actions and quantifying results.
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      </div>
    </>
  );
}

function CodeLab({ sessionRef, initialProblemRef }) {
  const session = sessionRef?.current || {};
  const [problems, setProblems] = useState({ categories: [], problems: [] });
  const [progress, setProgress] = useState({ solved: {}, bookmarked: [], savedCode: {} });
  const [selectedId, setSelectedId] = useState(initialProblemRef?.current || session.selectedId || null);
  const [code, setCode] = useState('');
  const [showDropdown, setShowDropdown] = useState(false);
  const [testResults, setTestResults] = useState(session.testResults || null);
  const [running, setRunning] = useState(false);
  const [bottomTab, setBottomTab] = useState(session.bottomTab || 'results');
  const [chatHistory, setChatHistory] = useState(session.chatHistory || []);
  const [chatInput, setChatInput] = useState(session.chatInput || '');
  const [chatLoading, setChatLoading] = useState(false);
  const [convId, setConvId] = useState(session.convId || null);
  const [revealedHints, setRevealedHints] = useState(session.revealedHints || {});
  const [showBottom, setShowBottom] = useState(session.showBottom || false);
  const [bottomHeight, setBottomHeight] = useState(session.bottomHeight || 260);
  const draggingRef = useRef(false);
  const [dailyTasks, setDailyTasks] = useState([]);
  const dropdownRef = useRef(null);

  // Persist session state on every change so it survives page switches
  useEffect(() => {
    if (sessionRef) {
      sessionRef.current = { selectedId, testResults, bottomTab, chatHistory, chatInput, convId, revealedHints, showBottom, bottomHeight };
    }
  }, [selectedId, testResults, bottomTab, chatHistory, chatInput, convId, revealedHints, showBottom, bottomHeight]);

  // Match a daily task text to a problem in the database
  const matchTaskToProblem = (taskText, allProblems) => {
    const lower = taskText.toLowerCase();
    return allProblems.find(p => lower.includes(p.title.toLowerCase()));
  };

  useEffect(() => {
    Promise.all([
      api.get('/api/problems'),
      api.get('/api/problems/progress'),
      api.get('/api/tasks'),
    ]).then(([probs, prog, allTaskDays]) => {
      setProblems(probs);
      setProgress(prog);

      // Extract today's coding tasks and match to problems
      const today = new Date().toISOString().slice(0, 10);
      const todayDay = (allTaskDays || []).find(day => day.date === today);
      const todayCodingTasks = (todayDay?.tasks || []).filter(t => t.category === 'coding');
      const matched = [];
      todayCodingTasks.forEach(t => {
        const prob = t.problemId
          ? (probs.problems || []).find(p => p.id === t.problemId)
          : matchTaskToProblem(t.text, probs.problems || []);
        matched.push({ task: t, problem: prob || null });
      });
      setDailyTasks(matched);

      // If navigated from a task click, use that specific problem
      const requestedId = initialProblemRef?.current;
      if (requestedId) {
        setSelectedId(requestedId);
        initialProblemRef.current = null;
      } else if (!session.selectedId) {
        // Auto-select first unsolved daily problem, or first problem overall
        const firstUnsolved = matched.find(m => m.problem && !prog.solved?.[m.problem.id]);
        if (firstUnsolved) {
          setSelectedId(firstUnsolved.problem.id);
        } else if (probs.problems?.length > 0) {
          setSelectedId(probs.problems[0].id);
        }
      }
    });
  }, []);

  const problem = problems.problems?.find(p => p.id === selectedId);

  // Load saved code or starter code when problem changes
  const problemCode = problem ? (progress.savedCode?.[problem.id] || problem.starterCode || '') : '';
  const prevProblemRef = useRef(null);
  useEffect(() => {
    if (!problem) return;
    setCode(problemCode);
    // Only reset chat/results when switching to a DIFFERENT problem, not when remounting with same problem
    if (prevProblemRef.current !== null && prevProblemRef.current !== problem.id) {
      setTestResults(null);
      setChatHistory([]);
      setConvId(null);
      setRevealedHints({});
      setShowBottom(false);
    }
    prevProblemRef.current = problem.id;
  }, [selectedId, problem?.id]);

  // Close dropdown on outside click
  useEffect(() => {
    const handler = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowDropdown(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const saveCode = (newCode) => {
    setCode(newCode);
    // Debounced save
    clearTimeout(window._codeSaveTimer);
    window._codeSaveTimer = setTimeout(() => {
      const updated = { ...progress, savedCode: { ...progress.savedCode, [selectedId]: newCode } };
      setProgress(updated);
      api.post('/api/problems/progress', updated);
    }, 1000);
  };

  const runTests = async () => {
    if (!problem) return;
    setRunning(true);
    setShowBottom(true);
    setBottomTab('results');
    try {
      const res = await api.post('/api/run-code', { code, functionName: problem.functionName, testCases: problem.testCases });
      setTestResults(res);
      // Auto-save code and mark solved when all tests pass
      if (res.results?.length > 0 && res.results.every(r => r.passed)) {
        clearTimeout(window._codeSaveTimer);
        const updated = {
          ...progress,
          savedCode: { ...progress.savedCode, [problem.id]: code },
          solved: { ...progress.solved, [problem.id]: { solvedAt: progress.solved?.[problem.id]?.solvedAt || new Date().toISOString(), attempts: (progress.solved?.[problem.id]?.attempts || 0) + 1 } }
        };
        setProgress(updated);
        api.post('/api/problems/progress', updated);
      }
    } catch (err) {
      setTestResults({ error: 'Failed to run code', results: [] });
    }
    setRunning(false);
  };

  const askClaude = async (msg) => {
    if (!problem) return;
    setChatLoading(true);
    setShowBottom(true);
    setBottomTab('chat');
    const userMsg = msg || chatInput || 'Please review my code and help me improve it.';
    setChatHistory(prev => [...prev, { role: 'user', content: userMsg }]);
    setChatInput('');
    try {
      const res = await api.post('/api/code-review', {
        problemId: problem.id,
        problemTitle: problem.title,
        problemDescription: problem.description,
        code,
        conversationId: convId,
        userMessage: convId ? userMsg : undefined,
      });
      setConvId(res.conversationId);
      setChatHistory(prev => [...prev, { role: 'assistant', content: res.response }]);
    } catch {
      setChatHistory(prev => [...prev, { role: 'assistant', content: 'Failed to reach the runtime assistant. Check that the CLI is available.' }]);
    }
    setChatLoading(false);
  };

  const grouped = {};
  (problems.categories || []).forEach(c => { grouped[c.id] = { ...c, problems: [] }; });
  (problems.problems || []).forEach(p => { if (grouped[p.category]) grouped[p.category].problems.push(p); });

  if (!problem) return (
    <div className="anim-enter" style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1}}>
      <div className="empty-state"><Icons.code className="empty-icon" /><p>Loading problems...</p></div>
    </div>
  );

  const allPassed = testResults?.results?.length > 0 && testResults.results.every(r => r.passed);
  const isSolved = !!progress.solved?.[problem.id];

  return (
    <>
      <div className="codelab-toolbar anim-enter">
        <h2>Code Lab</h2>
        <div ref={dropdownRef} style={{position:'relative'}}>
          <button className="problem-select-btn" onClick={() => setShowDropdown(!showDropdown)}>
            {isSolved && <Icons.check style={{width:14,height:14,color:'var(--emerald)'}} />}
            <span>{problem.title}</span>
            <span className={`diff-badge diff-${problem.difficulty}`}>{problem.difficulty}</span>
            <Icons.chevDown style={{width:14,height:14,opacity:0.5}} />
          </button>
          {showDropdown && (
            <div className="problem-dropdown">
              {Object.values(grouped).sort((a,b) => a.order - b.order).map(cat => (
                <div key={cat.id} className="cat-group">
                  <div className="cat-label">{cat.name}</div>
                  {cat.problems.sort((a,b) => a.order - b.order).map(p => (
                    <div key={p.id} className={`problem-item ${selectedId === p.id ? 'active' : ''}`} onClick={() => { setSelectedId(p.id); setShowDropdown(false); }}>
                      <Icons.check className={`pi-check ${progress.solved?.[p.id] ? 'solved' : ''}`} />
                      <span className="pi-title">{p.title}</span>
                      <span className={`diff-badge diff-${p.difficulty}`}>{p.difficulty}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{flex:1}} />
        {testResults?.results?.length > 0 && (
          <span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:700,color: allPassed ? 'var(--emerald)' : 'var(--rose)',display:'flex',alignItems:'center',gap:5}}>
            {allPassed ? <Icons.check style={{width:14,height:14}} /> : null}
            {testResults.results.filter(r=>r.passed).length}/{testResults.results.length} passing
          </span>
        )}
        <button className="btn btn-secondary" onClick={runTests} disabled={running} style={{padding:'8px 18px',fontSize:13,display:'flex',alignItems:'center',gap:6}}>
          <Icons.play style={{width:14,height:14}} /> {running ? 'Running...' : 'Run Tests'}
        </button>
        <button className="btn btn-link" onClick={() => askClaude()} disabled={chatLoading} style={{padding:'8px 18px',fontSize:13,display:'flex',alignItems:'center',gap:6}}>
          <Icons.messageCircle style={{width:14,height:14}} /> Ask AI
        </button>
      </div>

      {dailyTasks.length > 0 && (
        <div className="anim-enter anim-delay-1" style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)',fontWeight:600,textTransform:'uppercase',letterSpacing:1.5,marginRight:4}}>Assigned Problems</span>
          {dailyTasks.map((dt, i) => {
            const matched = dt.problem;
            const solved = matched && progress.solved?.[matched.id];
            const active = matched && selectedId === matched.id;
            // Extract short name from task text (e.g. "LeetCode #1 Two Sum - ..." → "Two Sum")
            const shortName = matched ? matched.title : dt.task.text.replace(/^LeetCode\s*#\d+\s*/i, '').split(' - ')[0].trim();
            return (
              <button key={i}
                onClick={() => matched && setSelectedId(matched.id)}
                disabled={!matched}
                style={{
                  display:'flex',alignItems:'center',gap:6,
                  padding:'6px 14px',borderRadius:8,fontSize:12,fontWeight:600,
                  fontFamily:'var(--font-mono)',cursor:matched?'pointer':'default',
                  background: active ? 'var(--amber-dim)' : 'var(--bg-surface)',
                  border: `1px solid ${active ? 'rgba(251,191,36,0.3)' : 'var(--border)'}`,
                  color: active ? 'var(--amber)' : solved ? 'var(--emerald)' : matched ? 'var(--text-secondary)' : 'var(--text-muted)',
                  opacity: matched ? 1 : 0.5,
                  transition:'all 0.2s',
                }}>
                {solved && <Icons.check style={{width:12,height:12}} />}
                {shortName}
              </button>
            );
          })}
        </div>
      )}

      <div className="codelab-split anim-enter anim-delay-1">
        {/* Left: Problem Description */}
        <div className="codelab-left">
          <h3>{problem.title}</h3>
          <div className="prob-diff"><span className={`diff-badge diff-${problem.difficulty}`}>{problem.difficulty}</span></div>
          <div className="prob-desc">{problem.description}</div>

          {problem.examples?.map((ex, i) => (
            <div key={i} className="example-box">
              <div className="ex-label">Example {i + 1}</div>
              <div className="ex-line"><strong>Input:</strong> {ex.input}</div>
              <div className="ex-line"><strong>Output:</strong> {ex.output}</div>
              {ex.explanation && <div className="ex-expl">{ex.explanation}</div>}
            </div>
          ))}

          {problem.constraints?.length > 0 && (
            <>
              <h3 style={{marginTop:16}}>Constraints</h3>
              <ul className="constraint-list">
                {problem.constraints.map((c, i) => <li key={i}>{c}</li>)}
              </ul>
            </>
          )}

          {problem.hints?.length > 0 && (
            <div style={{marginTop:8}}>
              {problem.hints.map((h, i) => (
                <div key={i} style={{marginBottom:6}}>
                  <button className={`hint-btn ${revealedHints[i] ? 'revealed' : ''}`} onClick={() => setRevealedHints(prev => ({...prev, [i]: !prev[i]}))}>
                    <Icons.lightbulb style={{width:12,height:12,verticalAlign:'middle',marginRight:4}} /> Hint {i + 1}
                  </button>
                  {revealedHints[i] && <div className="hint-text">{h}</div>}
                </div>
              ))}
            </div>
          )}

          {isSolved && (
            <div style={{marginTop:20,padding:'12px 16px',background:'var(--emerald-dim)',borderRadius:10,display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--emerald)',fontFamily:'var(--font-mono)',fontWeight:600}}>
              <Icons.check style={{width:16,height:16}} /> Solved
            </div>
          )}
        </div>

        {/* Right: Editor + Bottom Panel */}
        <div className="codelab-right">
          <div className="editor-container">
            <CMEditor code={problemCode} onChange={saveCode} key={selectedId} />
          </div>

          {showBottom && (
            <>
            <div className="bottom-resize-handle" onMouseDown={(e) => {
              e.preventDefault();
              draggingRef.current = true;
              const startY = e.clientY;
              const startH = bottomHeight;
              const onMove = (ev) => {
                if (!draggingRef.current) return;
                const delta = startY - ev.clientY;
                setBottomHeight(Math.max(150, Math.min(800, startH + delta)));
              };
              const onUp = () => { draggingRef.current = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
              document.addEventListener('mousemove', onMove);
              document.addEventListener('mouseup', onUp);
            }} />
            <div className="bottom-panel" style={{height: bottomHeight}}>
              <div className="bottom-tabs">
                <div className={`bottom-tab ${bottomTab==='results'?'active':''}`} onClick={() => setBottomTab('results')}>Results</div>
                <div className={`bottom-tab ${bottomTab==='chat'?'active':''}`} onClick={() => setBottomTab('chat')}>
                  Assistant {chatHistory.length > 0 ? `(${chatHistory.filter(m=>m.role==='assistant').length})` : ''}
                </div>
                <div style={{flex:1}} />
                <button onClick={() => setShowBottom(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:'4px 8px',fontSize:11,fontFamily:'var(--font-mono)'}} title="Collapse panel">
                  <Icons.chevDown style={{width:14,height:14}} />
                </button>
              </div>
              <div className="bottom-content" style={{overflow:'auto',flex:1}}>
                {bottomTab === 'results' && (
                  <div style={{fontSize:14,lineHeight:1.7}}>
                    {testResults?.error && <div className="test-fail" style={{marginBottom:8,fontSize:13,padding:'8px 12px',background:'rgba(239,68,68,0.08)',borderRadius:6}}>{testResults.error}</div>}
                    {testResults?.results?.length > 0 && (
                      <>
                        <div className={`test-summary ${allPassed ? 'test-pass' : 'test-fail'}`}>
                          {allPassed ? 'All tests passed!' : `${testResults.results.filter(r=>r.passed).length}/${testResults.results.length} tests passed`}
                        </div>
                        {testResults.results.map((r, i) => (
                          <div key={i} className="test-result" style={{padding:'10px 12px',marginBottom:6,background:'var(--bg-surface)',borderRadius:8,border:'1px solid var(--border)'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom: r.passed ? 0 : 6}}>
                              {r.passed
                                ? <Icons.check className="tr-icon test-pass" />
                                : <Icons.x className="tr-icon test-fail" />}
                              <span className={`tr-label ${r.passed?'test-pass':'test-fail'}`} style={{fontWeight:700}}>Case {i+1}</span>
                              {r.passed && <span className="tr-detail" style={{fontSize:13,color:'var(--text-secondary)'}}>Output: {r.actual}</span>}
                              {!r.passed && (
                                <button className="btn-help-test" disabled={chatLoading} style={{marginLeft:'auto'}} onClick={() => {
                                  const testCase = problem.testCases?.[i];
                                  const inputStr = testCase ? JSON.stringify(testCase.input) : 'unknown';
                                  const msg = `Test case ${i+1} is failing.\n\nInput: ${inputStr}\nExpected: ${r.expected || 'N/A'}\nGot: ${r.actual || 'N/A'}${r.error ? '\nError: ' + r.error : ''}\n\nDon't give me the answer. Help me think through why my code produces the wrong output for this input. What should I trace through or reconsider?`;
                                  askClaude(msg);
                                }}>
                                  <Icons.messageCircle style={{width:11,height:11}} /> Help
                                </button>
                              )}
                            </div>
                            {!r.passed && (
                              <div style={{fontSize:13,color:'var(--text-secondary)',fontFamily:'var(--font-mono)',padding:'6px 0 2px 26px',lineHeight:1.6}}>
                                {r.error ? <span style={{color:'var(--rose)'}}>{r.error}</span> : <>Expected <code style={{color:'var(--emerald)',background:'var(--emerald-dim)',padding:'1px 6px',borderRadius:4}}>{r.expected}</code>, got <code style={{color:'var(--rose)',background:'rgba(239,68,68,0.1)',padding:'1px 6px',borderRadius:4}}>{r.actual}</code></>}
                              </div>
                            )}
                          </div>
                        ))}
                      </>
                    )}
                    {!testResults && <div style={{color:'var(--text-muted)',fontSize:13}}>Click "Run Tests" to execute your code against test cases.</div>}
                  </div>
                )}
                {bottomTab === 'chat' && (
                  <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
                    <div className="chat-messages" style={{flex:1,overflow:'auto',paddingBottom:8}}>
                      {chatHistory.filter(m => !m.content.startsWith('You are a coding mentor')).map((m, i) => (
                        <div key={i} className={`chat-msg ${m.role}`}>
                          <div className="chat-bubble" style={{fontSize:14,lineHeight:1.7,maxWidth:'90%'}} dangerouslySetInnerHTML={m.role === 'assistant' ? {__html: marked.parse(m.content)} : undefined}>
                            {m.role === 'user' ? m.content : undefined}
                          </div>
                          <div style={{clear:'both'}} />
                        </div>
                      ))}
                      {chatLoading && <div className="chat-loading"><div className="dot-pulse"><span/><span/><span/></div> Assistant is thinking...</div>}
                    </div>
                    <div className="chat-input-row" style={{flexShrink:0,borderTop:'1px solid var(--border)',paddingTop:8}}>
                      <input className="chat-input" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="Ask a follow-up question..." onKeyDown={e => { if (e.key === 'Enter' && chatInput.trim()) askClaude(chatInput); }} />
                      <button className="btn btn-primary" style={{padding:'8px 16px',fontSize:13}} onClick={() => chatInput.trim() && askClaude(chatInput)} disabled={chatLoading}>Send</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
            </>
          )}
        </div>
      </div>
    </>
  );
}

/* Ace Editor Wrapper */
function CMEditor({ code, onChange }) {
  const ref = useRef(null);
  const editorRef = useRef(null);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange;
  useEffect(() => {
    if (!ref.current) return;
    const editor = ace.edit(ref.current, {
      mode: 'ace/mode/python',
      theme: 'ace/theme/one_dark',
      value: code,
      fontSize: 14,
      fontFamily: "'JetBrains Mono', monospace",
      tabSize: 4,
      useSoftTabs: true,
      showPrintMargin: false,
      enableBasicAutocompletion: true,
      enableLiveAutocompletion: false,
      highlightActiveLine: true,
      showGutter: true,
      wrap: false,
      scrollPastEnd: 0.5,
    });
    editor.container.style.background = '#020617';
    editor.renderer.setScrollMargin(8, 8);
    editor.renderer.$cursorLayer.element.style.display = '';

    editor.session.on('change', () => {
      onChangeRef.current(editor.getValue());
    });

    editorRef.current = editor;
    return () => { editor.destroy(); editorRef.current = null; };
  }, []);

  return <div ref={ref} style={{height:'100%',width:'100%'}} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
